<!DOCTYPE html>
<html>
<head>
    <script>
        // Redirect if the session key is missing
        if (sessionStorage.getItem("authorized") !== "true") {
            window.location.replace("passcode.html");
        }
    </script>
    <title>Dashboard</title>
</head>
<body>
    <h1>Access Granted</h1>
    <p>Welcome to the private area.</p>
    <button onclick="sessionStorage.clear(); location.reload();">Log Out</button>
</body>
</html>
