<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · Private Portal</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 32px; width: 300px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h2 { font-size: 24px; font-weight: 300; margin-bottom: 20px; color: #f0f6fc; }
        label { display: block; text-align: left; font-size: 14px; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 8px 12px; background-color: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #f0f6fc; font-size: 16px; box-sizing: border-box; margin-bottom: 16px; outline: none; }
        input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.3); }
        button { width: 100%; padding: 10px; background-color: #238636; color: #ffffff; border: 1px solid rgba(240, 246, 252, 0.1); border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #2ea043; }
        .error { color: #f85149; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Enter Passcode</h2>
        <label for="passInput">6-Digit Code</label>
        <input type="password" id="passInput" maxlength="6" autofocus>
        <button onclick="checkAccess()">Unlock</button>
        <p id="errorMsg" class="error">Invalid passcode or connection error.</p>
    </div>

<script>
   async function checkAccess() {
    const code = document.getElementById('passInput').value;
    const error = document.getElementById('errorMsg');
    const BUCKET_ID = "YOUR_UNIQUE_ID_HERE"; // <--- DID YOU CHANGE THIS?

    if (code.length === 6) {
        try {
            // 1. Check if the passcode file exists first
            const authRes = await fetch(`passwords/${code}.txt`);
            
            if (!authRes.ok) {
                error.innerText = "Invalid passcode.";
                error.style.display = "block";
                return;
            }

            // 2. Try to get IP (Optional - if this fails, we still let them in)
            let logData = "Unknown IP";
            try {
                const ipRes = await fetch("https://api.ipify.org");
                const { ip } = await ipRes.json();
                logData = `IP: ${ip} | Browser: ${navigator.userAgent.split(' ').pop()}`;
            } catch (e) { console.log("IP fetch failed, skipping log."); }

            // 3. Try to log to database (Only if BUCKET_ID is set)
            if (BUCKET_ID !== "YOUR_UNIQUE_ID_HERE") {
                await fetch(`https://kvdb.io{BUCKET_ID}/${code}`, {
                    method: 'POST',
                    body: `${logData} | Time: ${new Date().toLocaleString()}`
                });
            }

            // 4. Set session and redirect
            sessionStorage.setItem("authorized", "true");
            if (code === "412230") sessionStorage.setItem("role", "admin");
            window.location.href = "index.html";

        } catch (err) {
            console.error(err);
            error.innerText = "Connection error. Check console (F12) for details.";
            error.style.display = "block";
        }
    }
}

</script>
</body>
</html>
